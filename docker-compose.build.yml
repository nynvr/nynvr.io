services:

#   db:
#     image: postgres:15
#     volumes:
#       - postgres_data:/var/lib/postgresql/data
#     environment:
#       - POSTGRES_DB=nynvriodb
#       - POSTGRES_USER=nynvrio
#       - POSTGRES_PASSWORD=nynvriopass

  backend:
    build:
      context: ./backend/
      dockerfile: ./environments/production/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=production-django-secret
      - ALLOWED_HOSTS=*
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=nynvriodb
      - DB_USER=nynvrio_user
      - DB_PASSWORD=nynvrio_pass
      - SUPERUSER=nynvr
      - SU_PASSWORD=password
      - SU_AUTH_TOKE=f53c73f61a57935dfdd2384a9269c8c2793f0075
    # depends_on:
    #   - db

  web:
    build:
      context: ./web
      dockerfile: ./environments/production/Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - NYNVRIO_API_URL=http://backend:8000
      - NYNVRIO_TOKEN=f53c73f61a57935dfdd2384a9269c8c2793f0075
      - GOOGLEANALYTICS_ID=production-google-analytics
    depends_on:
      - backend
    volumes:
      - ./web/app:/app
      - /app/node_modules
      - /app/.next

