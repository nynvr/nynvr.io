services:
  backend:
    build:
      context: ./backend/
      dockerfile: ./environments/development/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=development-django-secret
      - ALLOWED_HOSTS=*
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=nynvriodb
      - DB_USER=nynvrio_user
      - DB_PASSWORD=nynvrio_pass
      - SUPERUSER=nynvr
      - SU_PASSWORD=password
      - SU_AUTH_TOKE=f53c73f61a57935dfdd2384a9269c8c2793f0075
